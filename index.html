<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL_UBUNTU_v26</title>
    <style>
        body { margin: 0; background: #000; color: #e95420; font-family: 'Ubuntu', monospace; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 250px; border-right: 2px solid #e95420; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #1e0918; }
        .btn { background: #5e2750; color: #fff; border: 1px solid #aea79f; padding: 12px; cursor: pointer; border-radius: 4px; font-family: inherit; }
        .btn:hover { background: #e95420; }
        #monitor-area { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .log { font-size: 10px; color: #772953; margin-top: auto; border-top: 1px solid #333; pt: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>UBUNTU_v26</h3>
    <button class="btn" onclick="boot('ubuntu')">▶ BOOT_UBUNTU</button>
    <button class="btn" onclick="boot('gui')">▶ BOOT_X_WINDOW</button>
    
    <div class="log" id="status-log">> SYSTEM_IDLE</div>
</div>

<div id="monitor-area">
    <iframe id="screen" src="about:blank"></iframe>
</div>

<script>
    function boot(type) {
        const screen = document.getElementById('screen');
        const log = document.getElementById('status-log');
        log.innerText = "> MOUNTING_FILESYSTEM...";
        
        if(type === 'ubuntu') {
            // This is a specialized WebVM for Linux
            screen.src = "https://bellard.org/jslinux/vm.html?cpu=riscv64&url=fedora33-riscv.cfg&mem=256";
        } else {
            // This is a Graphical version
            screen.src = "https://bellard.org/jslinux/vm.html?url=win2k.cfg&mem=192";
        }

        screen.onload = () => { log.innerText = "> KERNEL_LOADED_SUCCESS"; };
    }
</script>
</body>
</html>
