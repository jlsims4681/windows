<!DOCTYPE html>
<html>
<head>
    <title>MASTER_CONSOLE_v20</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; border-right: 2px solid #00ff41; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #010a01; }
        .btn { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 12px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; }
        #monitor { flex: 1; border: none; background: #111; }
        .status-text { font-size: 12px; color: #008800; }
        .reset-btn { margin-top: auto; border-color: red; color: red; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CONSOLE_v20</h2>
    <div class="status-text">SYSTEM: ONLINE<br>TARGET: win10.html</div>
    
    <button class="btn" onclick="bootSystem()">▶ BOOT_SYSTEM</button>
    
    <button class="btn reset-btn" onclick="sendReset()">☢️ RUN_REDONE</button>
</div>

<iframe id="monitor" src="about:blank"></iframe>

<script>
    function bootSystem() {
        // Points to your other file in the same repo
        document.getElementById('monitor').src = "win10.html";
    }

    function sendReset() {
        // Sends a 'Hidden Signal' to the Windows file inside the iframe
        const frame = document.getElementById('monitor').contentWindow;
        frame.postMessage({ type: "MACRO" }, "*");
    }
</script>
</body>
</html>
