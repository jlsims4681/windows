<!DOCTYPE html>
<html>
<head>
    <title>MASTER_CONSOLE_V23</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        #sidebar { width: 260px; border-right: 2px solid #00ff41; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #010a01; z-index: 10; }
        .btn { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 12px; cursor: pointer; text-align: left; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; }
        
        /* The "Monitor" Screen */
        #display-container { flex: 1; background: #111; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .status-box { font-size: 11px; color: #008800; margin-bottom: 10px; border: 1px solid #004400; padding: 5px; }
        .emergency-btn { margin-top: auto; border-color: #ff3e3e; color: #ff3e3e; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CORE_v23</h2>
    <div class="status-box">OS_LINK: STABLE<br>DRIVE: CLOUD_HD_0</div>

    <button class="btn" onclick="bootOS('https://dustinbrett.com/')">▶ BOOT_WIN10</button>
    
    <button class="btn" onclick="bootOS('https://win11.blueedge.me/')">▶ BOOT_WIN11_(maybeidk)</button>

    <button class="btn emergency-btn" onclick="triggerReset()"> RUN_REDONE</button>
    
    <div id="console-log" style="font-size: 10px; margin-top: 10px;">> STANDBY</div>
</div>

<div id="display-container">
    <iframe id="monitor" src="about:blank"></iframe>
</div>

<script>
    function bootOS(url) {
        const monitor = document.getElementById('monitor');
        const log = document.getElementById('console-log');
        
        log.innerText = "> INITIALIZING_KERNEL...";
        monitor.src = url;
        
        monitor.onload = () => {
            log.innerText = "> SYSTEM_LIVE_AND_STABLE";
        };
    }

    function triggerReset() {
        // Since these are external sites, we can't 'BSOD' them, 
        // but we can "Crash" the monitor and reboot it.
        const log = document.getElementById('console-log');
        log.innerText = "> EMERGENCY_RESET_TRIGGERED";
        document.getElementById('monitor').src = "about:blank";
        
        setTimeout(() => {
            log.innerText = "> REBOOTING...";
            bootOS('https://dustinbrett.com/');
        }, 2000);
    }
</script>
</body>
</html>
