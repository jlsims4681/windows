<!DOCTYPE html>
<html>
<head>
    <title>UBUNTU_LIGHT_v28</title>
    <style>
        body { 
            margin: 0; 
            background: #401030 url('https://wallpaperaccess.com/full/1510344.jpg'); 
            background-size: cover;
            font-family: 'Ubuntu', sans-serif;
            height: 100vh; overflow: hidden;
        }
        
        /* Sidebar/Dock */
        #dock { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 60px; 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px;
        }
        .icon { width: 40px; height: 40px; cursor: pointer; transition: 0.2s; }
        .icon:hover { transform: scale(1.2); }

        /* Terminal Window */
        .window {
            position: absolute; top: 10%; left: 100px; width: 800px; height: 500px;
            background: #300a24; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; flex-direction: column; border: 1px solid #5e2750;
        }
        .win-header { 
            background: #444; padding: 10px; border-radius: 8px 8px 0 0;
            display: flex; justify-content: space-between; color: white; cursor: move;
        }
        .close-btn { color: #ef5350; cursor: pointer; font-weight: bold; }
        
        iframe { flex: 1; border: none; background: #000; }
        
        /* Top Bar */
        #top-bar { height: 30px; background: rgba(0,0,0,0.8); width: 100%; color: white; display: flex; align-items: center; padding: 0 20px; font-size: 13px; }
    </style>
</head>
<body>

<div id="top-bar">Activities &nbsp;&nbsp;&nbsp; Mar 11 19:35</div>

<div id="dock">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/a/af/Adobe_Photoshop_CC_icon.svg" onclick="alert('App Loading...')">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Android_Terminal_Emulator_Icon.png" onclick="openTerminal()">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Firefox_logo%2C_2019.svg" onclick="alert('Browser Locked')">
</div>

<div id="term-window" class="window">
    <div class="win-header">
        <span>Terminal (Ubuntu Core)</span>
        <span class="close-btn" onclick="closeTerminal()">●</span>
    </div>
    <iframe id="linux-frame" src="about:blank"></iframe>
</div>

<script>
    function openTerminal() {
        const win = document.getElementById('term-window');
        const frame = document.getElementById('linux-frame');
        win.style.display = 'flex';
        
        // Only load if it hasn't been loaded yet
        if (frame.src === "about:blank") {
            frame.src = "https://copy.sh/v86/?profile=alpine";
        }
    }

    function closeTerminal() {
        document.getElementById('term-window').style.display = 'none';
    }
</script>
</body>
</html>
